<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verificador de Números Primos</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0f;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }

    .app {
      background: #0a0a0f;
      width: 100%;
      max-width: 600px;
      font-family: 'Syne', sans-serif;
      color: #e8e4ff;
      padding: 2.5rem 2rem 1.5rem;
      position: relative;
      overflow: hidden;
    }

    .grid-bg {
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(120,80,255,0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(120,80,255,0.07) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .glow-orb {
      position: fixed;
      width: 320px; height: 320px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(100,60,240,0.18) 0%, transparent 70%);
      top: -80px; right: -60px;
      pointer-events: none;
      transition: all 0.8s ease;
      z-index: 0;
    }
    .glow-orb.active-prime { background: radial-gradient(circle, rgba(60,220,160,0.22) 0%, transparent 70%); }
    .glow-orb.active-notprime { background: radial-gradient(circle, rgba(240,60,100,0.22) 0%, transparent 70%); }

    .app > *:not(.grid-bg):not(.glow-orb) { position: relative; z-index: 1; }

    .corner-tag {
      position: absolute; top: 1.5rem; left: 2rem;
      font-family: 'Space Mono', monospace; font-size: 10px;
      color: rgba(150,130,255,0.5); letter-spacing: 3px; text-transform: uppercase;
      z-index: 1;
    }

    .title-block { margin-top: 2rem; margin-bottom: 2.5rem; }
    .title-block h1 {
      font-size: 13px; font-weight: 700; letter-spacing: 4px;
      text-transform: uppercase; color: rgba(150,130,255,0.7);
      margin-bottom: 8px; font-family: 'Space Mono', monospace;
    }
    .title-block p { font-size: 26px; font-weight: 800; color: #f0ecff; line-height: 1.1; }

    .input-zone { position: relative; margin-bottom: 2rem; }
    .num-input {
      width: 100%; background: rgba(255,255,255,0.04);
      border: 1px solid rgba(120,80,255,0.3); border-radius: 4px;
      padding: 1rem 1.25rem; font-family: 'Space Mono', monospace;
      font-size: 28px; font-weight: 700; color: #f0ecff;
      text-align: center; letter-spacing: 4px; outline: none;
      transition: border-color 0.3s, box-shadow 0.3s;
      -moz-appearance: textfield;
    }
    .num-input::-webkit-outer-spin-button,
    .num-input::-webkit-inner-spin-button { -webkit-appearance: none; }
    .num-input:focus { border-color: rgba(120,80,255,0.8); box-shadow: 0 0 0 3px rgba(120,80,255,0.12); }
    .num-input.state-prime { border-color: rgba(60,220,160,0.6); box-shadow: 0 0 0 3px rgba(60,220,160,0.1); }
    .num-input.state-notprime { border-color: rgba(240,60,100,0.6); box-shadow: 0 0 0 3px rgba(240,60,100,0.1); }

    .input-hint {
      margin-top: 6px; font-family: 'Space Mono', monospace;
      font-size: 10px; color: rgba(150,130,255,0.4);
      text-align: center; letter-spacing: 2px;
    }

    .verify-btn {
      width: 100%; padding: 0.9rem;
      background: rgba(120,80,255,0.15);
      border: 1px solid rgba(120,80,255,0.5); border-radius: 4px;
      color: #c8b8ff; font-family: 'Syne', sans-serif;
      font-size: 14px; font-weight: 700; letter-spacing: 3px;
      text-transform: uppercase; cursor: pointer;
      transition: all 0.2s; margin-bottom: 1.75rem;
    }
    .verify-btn:hover { background: rgba(120,80,255,0.28); border-color: rgba(150,110,255,0.8); color: #e0d4ff; }
    .verify-btn:active { transform: scale(0.98); }

    .verdict { display: none; margin-bottom: 1.5rem; animation: fadeUp 0.4s ease; }
    .verdict.visible { display: block; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .verdict-inner {
      border-radius: 4px; padding: 1.25rem 1.5rem;
      border-left: 3px solid; display: flex; align-items: center; gap: 1rem;
    }
    .verdict-inner.prime { background: rgba(60,220,160,0.08); border-color: #3cdca0; }
    .verdict-inner.notprime { background: rgba(240,60,100,0.08); border-color: #f03c64; }

    .verdict-icon {
      width: 48px; height: 48px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; font-family: 'Space Mono', monospace;
      font-weight: 700; font-size: 18px;
    }
    .verdict-inner.prime .verdict-icon { background: rgba(60,220,160,0.15); color: #3cdca0; border: 1px solid rgba(60,220,160,0.3); }
    .verdict-inner.notprime .verdict-icon { background: rgba(240,60,100,0.15); color: #f03c64; border: 1px solid rgba(240,60,100,0.3); }

    .v-number { font-size: 22px; font-weight: 800; margin-bottom: 2px; }
    .verdict-inner.prime .v-number { color: #3cdca0; }
    .verdict-inner.notprime .v-number { color: #f03c64; }
    .v-label { font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: rgba(200,190,255,0.6); }
    .v-reason { font-size: 13px; color: rgba(200,190,255,0.7); margin-top: 4px; }

    .steps-section { display: none; margin-bottom: 1rem; }
    .steps-section.visible { display: block; animation: fadeUp 0.5s ease 0.1s both; }
    .steps-label {
      font-family: 'Space Mono', monospace; font-size: 10px;
      letter-spacing: 3px; text-transform: uppercase;
      color: rgba(150,130,255,0.5); margin-bottom: 10px;
      display: flex; align-items: center; gap: 8px;
    }
    .steps-label::after { content: ''; flex: 1; height: 1px; background: rgba(120,80,255,0.2); }

    .steps-wrap { display: flex; flex-wrap: wrap; gap: 6px; }
    .step-tag { font-family: 'Space Mono', monospace; font-size: 11px; padding: 4px 10px; border-radius: 2px; border: 1px solid; }
    .step-tag.ok { border-color: rgba(60,220,160,0.3); color: rgba(60,220,160,0.8); background: rgba(60,220,160,0.06); }
    .step-tag.fail { border-color: rgba(240,60,100,0.6); color: #ff6a85; background: rgba(240,60,100,0.12); font-weight: 700; }

    .examples-section { margin-top: 1.75rem; }
    .examples-label {
      font-family: 'Space Mono', monospace; font-size: 10px;
      letter-spacing: 3px; text-transform: uppercase;
      color: rgba(150,130,255,0.5); margin-bottom: 10px;
      display: flex; align-items: center; gap: 8px;
    }
    .examples-label::after { content: ''; flex: 1; height: 1px; background: rgba(120,80,255,0.2); }
    .examples-chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .chip {
      font-family: 'Space Mono', monospace; font-size: 13px; font-weight: 700;
      padding: 6px 16px; border-radius: 2px;
      background: rgba(180,160,255,0.12); border: 1px solid rgba(180,160,255,0.35);
      color: #d4c8ff; cursor: pointer; transition: all 0.15s; line-height: 1;
    }
    .chip:hover { background: rgba(180,160,255,0.25); border-color: rgba(200,180,255,0.6); color: #fff; }

    .footer {
      margin-top: 2.5rem;
      padding-top: 1.25rem;
      border-top: 1px solid rgba(120,80,255,0.15);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }
    .footer-left { display: flex; flex-direction: column; gap: 3px; }
    .footer-name { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; color: #c8b8ff; letter-spacing: 0.5px; }
    .footer-role { font-family: 'Space Mono', monospace; font-size: 10px; color: rgba(150,130,255,0.5); letter-spacing: 2px; text-transform: uppercase; }
    .footer-badge {
      display: flex; align-items: center; gap: 6px;
      background: rgba(120,80,255,0.1); border: 1px solid rgba(120,80,255,0.25);
      border-radius: 2px; padding: 5px 12px; flex-shrink: 0;
    }
    .footer-badge-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #7850ff; animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.8); }
    }
    .footer-badge-text { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: rgba(150,130,255,0.7); }
  </style>
</head>
<body>
  <div class="grid-bg"></div>
  <div class="glow-orb" id="glowOrb"></div>

  <div class="app">
    <div class="corner-tag">PRIME — v2.1</div>

    <div class="title-block">
      <h1>Verificador</h1>
      <p>¿Es primo<br>este número?</p>
    </div>

    <div class="input-zone">
      <input type="number" class="num-input" id="numInput" placeholder="0" min="0" step="1" />
      <div class="input-hint">↵ ENTER O BOTÓN PARA VERIFICAR</div>
    </div>

    <button class="verify-btn" onclick="verificar()">Verificar número</button>

    <div class="verdict" id="verdict">
      <div class="verdict-inner" id="verdictInner">
        <div class="verdict-icon" id="verdictIcon"></div>
        <div class="verdict-text">
          <div class="v-number" id="vNumber"></div>
          <div class="v-label" id="vLabel"></div>
          <div class="v-reason" id="vReason"></div>
        </div>
      </div>
    </div>

    <div class="steps-section" id="stepsSection">
      <div class="steps-label">Divisores probados hasta √n</div>
      <div class="steps-wrap" id="stepsWrap"></div>
    </div>

    <div class="examples-section">
      <div class="examples-label">Prueba rápida</div>
      <div class="examples-chips" id="examplesChips"></div>
    </div>

    <div class="footer">
      <div class="footer-left">
        <span class="footer-name">Johan Steven Rodríguez</span>
        <span class="footer-role">Elaborado por el autor</span>
      </div>
      <div class="footer-badge">
        <div class="footer-badge-dot"></div>
        <span class="footer-badge-text">Asistido por IA</span>
      </div>
    </div>
  </div>

  <script>
    const ejemplos = [2, 3, 7, 11, 13, 25, 37, 97, 100, 127, 1, 0];
    const chipsContainer = document.getElementById('examplesChips');
    ejemplos.forEach(n => {
      const c = document.createElement('button');
      c.className = 'chip';
      c.textContent = n;
      c.onclick = () => { document.getElementById('numInput').value = n; verificar(); };
      chipsContainer.appendChild(c);
    });

    document.getElementById('numInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') verificar();
    });

    function esPrimo(n) {
      if (n < 2) return { primo: false, pasos: [] };
      if (n === 2) return { primo: true, pasos: [] };
      if (n % 2 === 0) return { primo: false, pasos: [{ d: 2, divide: true }] };
      const pasos = [];
      const lim = Math.floor(Math.sqrt(n));
      for (let i = 3; i <= lim; i += 2) {
        const divide = n % i === 0;
        pasos.push({ d: i, divide });
        if (divide) return { primo: false, pasos };
      }
      return { primo: true, pasos };
    }

    function verificar() {
      const raw = document.getElementById('numInput').value.trim();
      if (raw === '') return;
      const n = parseInt(raw, 10);

      const verdict = document.getElementById('verdict');
      const verdictInner = document.getElementById('verdictInner');
      const stepsSection = document.getElementById('stepsSection');
      const input = document.getElementById('numInput');
      const orb = document.getElementById('glowOrb');

      verdict.classList.remove('visible');
      stepsSection.classList.remove('visible');
      input.className = 'num-input';
      orb.className = 'glow-orb';

      if (isNaN(n) || n < 0) {
        verdict.classList.add('visible');
        verdictInner.className = 'verdict-inner notprime';
        document.getElementById('verdictIcon').textContent = '!';
        document.getElementById('vNumber').textContent = raw;
        document.getElementById('vLabel').textContent = 'Entrada inválida';
        document.getElementById('vReason').textContent = 'Ingresa un número entero positivo.';
        return;
      }

      const { primo, pasos } = esPrimo(n);

      verdict.classList.add('visible');
      verdictInner.className = 'verdict-inner ' + (primo ? 'prime' : 'notprime');
      document.getElementById('verdictIcon').textContent = primo ? 'P' : '∅';
      document.getElementById('vNumber').textContent = n.toLocaleString('es-CO');
      document.getElementById('vLabel').textContent = primo ? 'Número primo' : 'No es primo';

      if (n < 2) {
        document.getElementById('vReason').textContent = 'Menor que 2. Los primos comienzan en el 2.';
      } else if (primo) {
        const lim = Math.floor(Math.sqrt(n));
        document.getElementById('vReason').textContent = `Ningún entero de 2 a ${lim} lo divide. Solo divisible entre 1 y sí mismo.`;
      } else {
        const { d } = pasos[pasos.length - 1];
        document.getElementById('vReason').textContent = `${n} ÷ ${d} = ${n / d}. Tiene un divisor diferente de 1 y sí mismo.`;
      }

      input.className = 'num-input ' + (primo ? 'state-prime' : 'state-notprime');
      orb.className = 'glow-orb ' + (primo ? 'active-prime' : 'active-notprime');

      if (pasos.length > 0) {
        stepsSection.classList.add('visible');
        const wrap = document.getElementById('stepsWrap');
        wrap.innerHTML = '';
        pasos.forEach(({ d, divide }) => {
          const t = document.createElement('span');
          t.className = 'step-tag ' + (divide ? 'fail' : 'ok');
          t.textContent = divide ? `÷${d} = ${Math.floor(n / d)} ✕` : `÷${d}`;
          wrap.appendChild(t);
        });
      }
    }
  </script>
</body>
</html>
